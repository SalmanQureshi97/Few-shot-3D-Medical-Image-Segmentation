experiment:
  name: ablation_a5_swin_unetr
  seed: 29
  out_dir: runs/ablation_a5_swin_unetr
data:
  modalities:
  - t1
  - ir
  - flair
  target: coarse
  num_classes: 4
  ignore_index: 255
  ignore_hindbrain_in_coarse: true
  cache_subjects: true
  intensity_clip_percentiles:
  - 0.5
  - 99.5
model:
  name: swin_unetr
  in_channels: 3
  out_channels: 4
  feature_size: 48
  patch_size:
  - 32
  - 96
  - 96
  deep_supervision: false
  gradient_checkpointing: true
training:
  epochs: 220
  batch_size: 1
  samples_per_epoch: 512
  patch_size:
  - 32
  - 96
  - 96
  foreground_patch_ratio: 0.8
  class_balanced_ratio: 0.15
  class_balanced_classes:
  - 1
  - 2
  - 3
  lr: 0.0002
  weight_decay: 5.0e-05
  loss: dice_ce
  dice_weight: 0.6
  ce_weight: 0.4
  focal_gamma: 0.0
  class_weights:
  - 0.10000000149011612
  - 1.3465327024459839
  - 1.0203113555908203
  - 1.5465314388275146
  amp: true
  num_workers: 4
  val_interval: 5
  save_every: 0
  scheduler: cosine_warmup
  warmup_epochs: 15
  grad_clip: 1.0
  ema_decay: 0.999
  early_stop_patience: 0
  overlay_every: 25
augmentation:
  enabled: true
  flip_probability: 0.5
  intensity_probability: 0.8
  intensity_scale_range:
  - 0.9
  - 1.1
  intensity_shift_range:
  - -0.1
  - 0.1
  noise_std: 0.03
  gamma_range:
  - 0.75
  - 1.35
  affine_probability: 0.5
  rotate_range_deg:
  - -10.0
  - 10.0
  scale_range:
  - 0.9
  - 1.1
inference:
  roi_size:
  - 32
  - 96
  - 96
  sw_batch_size: 2
  overlap: 0.5
  tta_flips:
  - - 3
  - - 2
  gaussian_sigma_scale: 0.125
  amp: true
