experiment:
  name: improved_resattn_unet3d
  seed: 29
  out_dir: runs/improved_resattn_unet3d

data:
  modalities: [t1, ir, flair]
  target: coarse
  num_classes: 4
  ignore_index: 255
  ignore_hindbrain_in_coarse: true
  cache_subjects: true
  intensity_clip_percentiles: [0.5, 99.5]

model:
  name: resattn_unet3d
  in_channels: 3
  out_channels: 4
  base_channels: 16
  levels: 4
  norm: instance
  dropout: 0.1
  deep_supervision: true

training:
  epochs: 220
  batch_size: 2
  samples_per_epoch: 640
  patch_size: [32, 96, 96]
  foreground_patch_ratio: 0.8
  lr: 0.00025
  weight_decay: 0.0002
  loss: dice_ce
  dice_weight: 0.65
  ce_weight: 0.35
  amp: true
  num_workers: 2
  val_interval: 5
  save_every: 25

augmentation:
  enabled: true
  flip_probability: 0.5
  intensity_probability: 0.8
  noise_std: 0.03
  gamma_range: [0.75, 1.35]

inference:
  roi_size: [32, 96, 96]
  sw_batch_size: 2
  overlap: 0.5
  tta_flips: [[3], [2], [2, 3]]

